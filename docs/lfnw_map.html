<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>LFNW 2026 Conference Map</title>
    <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4/dist/maplibre-gl.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #f5f5f5;
            color: #333;
        }

        .page-header {
            max-width: 900px;
            margin: 40px auto 0;
            padding: 0 20px;
        }
        .page-header h1 {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 16px;
        }

        .map-card {
            max-width: 900px;
            margin: 0 auto 40px;
            padding: 0 20px;
        }
        .map-card-inner {
            background: #fff;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.1);
        }

        #map { width: 100%; height: 500px; }

        .map-legend {
            padding: 12px 20px;
            border-top: 1px solid #eee;
            display: flex;
            gap: 20px;
            font-size: 13px;
            color: #555;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .legend-marker {
            position: relative;
            width: 19px;
            height: 29px;
            flex-shrink: 0;
        }
        .legend-marker .maplibregl-marker {
            position: absolute;
            top: 0;
            left: 0;
        }

        .map-filters {
            display: flex;
            gap: 12px;
            margin-left: auto;
        }
        .map-filters a {
            display: inline-flex;
            align-items: center;
            text-decoration: none;
            background: #3e7f9e;
            color: #fff;
            font-size: 14px;
            padding: 3px 10px;
            border-radius: 4px;
        }
        .map-filters a:hover { background: #304858; }
        .map-filters a.active { background: #304858; }
        .legend-line {
            width: 24px;
            height: 2px;
            background: repeating-linear-gradient(
                to right,
                #e67e22 0px, #e67e22 6px,
                transparent 6px, transparent 10px
            );
            flex-shrink: 0;
        }

        .marker-popup h3 { margin: 0 0 4px; font-size: 14px; }
        .marker-popup p { margin: 0; font-size: 12px; color: #555; }
        .marker-popup a { color: #2980b9; text-decoration: none; font-size: 11px; border: none; }
        .marker-popup a:hover { text-decoration: underline; }

        @media (max-width: 600px) {
            .map-card { padding: 0; }
            .map-card-inner { border-radius: 0; }
            #map { height: 60svh; }
            .map-legend { flex-wrap: wrap; gap: 10px; }
            .map-filters { margin-left: 0; flex-wrap: wrap; }
            .map-filters a { padding: 8px 14px; }
        }
    </style>
</head>
<body>

<div class="page-header">
    <h1>LFNW 2026 Conference Map</h1>
</div>

<div class="map-card">
    <div class="map-card-inner">
        <div id="map"></div>
        <div class="map-legend">
            <div class="legend-item">
                <div class="legend-marker" id="legend-marker-conf"></div>
                <span>Conference</span>
            </div>
            <div class="legend-item">
                <div class="legend-marker" id="legend-marker-social"></div>
                <span>Social</span>
            </div>
            <div class="legend-item">
                <div class="legend-line"></div>
                <span>Friday Stroll</span>
            </div>
            <div class="map-filters">
                <a href="#" data-day="Pre Conference">Pre Conference</a>
                <a href="#" data-day="Breakfast">Breakfast</a>
                <a href="#" data-day="Conference">Conference</a>
                <a href="#" data-day="Dinner">Dinner</a>
            </div>
        </div>
    </div>
</div>

<script src="https://unpkg.com/maplibre-gl@4/dist/maplibre-gl.js"></script>
<script>
document.getElementById("legend-marker-conf").appendChild(
    new maplibregl.Marker({ color: "#2980b9", scale: 0.7 }).getElement()
);
document.getElementById("legend-marker-social").appendChild(
    new maplibregl.Marker({ color: "#FF7F50", scale: 0.7 }).getElement()
);

const dayBounds = {};

const map = new maplibregl.Map({
    container: "map",
    style: "osm-bright-style_college_added.json",
    center: [-122.495, 48.757],
    zoom: 13
});


map.on("load", () => {
    map.addSource("friday-stroll", {
        type: "geojson",
        data: "Friday_Stroll.geojson"
    });

    const firstLabelLayer = map.getStyle().layers.find(l => l.type === "symbol")?.id;

    map.addLayer({
        id: "friday-stroll-line",
        type: "line",
        source: "friday-stroll",
        paint: {
            "line-color": "#e67e22",
            "line-width": 2,
            "line-dasharray": [2, 1.5]
        }
    }, firstLabelLayer);

    map.addSource("conference-locations", {
        type: "geojson",
        data: "conference_locations.geojson"
    });

    map.addLayer({
        id: "location-labels",
        type: "symbol",
        source: "conference-locations",
        filter: ["==", ["get", "day"], "__none__"],
        layout: {
            "text-field": ["get", "label"],
            "text-size": 12,
            "text-font": ["Noto Sans Regular"],
            "text-anchor": "top",
            "text-allow-overlap": true
        },
        paint: {
            "text-color": "#304858",
            "text-halo-color": "rgba(255,255,255,0.7)",
            "text-halo-width": 2
        }
    });

    fetch("conference_locations.geojson")
        .then(r => r.json())
        .then(data => {
            const bounds = new maplibregl.LngLatBounds();

            data.features.forEach(feature => {
                const props = feature.properties;
                const coords = feature.geometry.coordinates;
                bounds.extend(coords);

                if (props.day) {
                    if (!dayBounds[props.day]) dayBounds[props.day] = new maplibregl.LngLatBounds();
                    dayBounds[props.day].extend(coords);
                }

                const color = props.category2 === "social" ? "#FF7F50" : "#2980b9";
                const popup = new maplibregl.Popup({ offset: 25 })
                    .setHTML(`
                        <div class="marker-popup">
                            <h3>${props.location_name}</h3>
                            ${props.info_box ? `<p>${props.info_box}</p>` : ""}
                            ${props.osm_link ? `<a href="${props.osm_link}" target="_blank">View on OpenStreetMap</a>` : ""}
                        </div>
                    `);

                new maplibregl.Marker({ color, scale: 0.7 })
                    .setLngLat(coords)
                    .setPopup(popup)
                    .addTo(map);
            });

            document.querySelectorAll(".map-filters a").forEach(link => {
                link.addEventListener("click", (e) => {
                    e.preventDefault();
                    document.querySelectorAll(".map-filters a").forEach(l => l.classList.remove("active"));
                    link.classList.add("active");
                    const day = link.dataset.day;
                    map.setFilter("location-labels", ["all",
                        ["==", ["get", "day"], day],
                        ["has", "label"]
                    ]);
                    if (dayBounds[day]) map.fitBounds(dayBounds[day], { padding: 80, maxZoom: 16 });
                });
            });

            map.fitBounds(bounds, { padding: 60, maxZoom: 15 });
        });
});
</script>

</body>
</html>
