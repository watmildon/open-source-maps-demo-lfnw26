<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>LFNW 2026 Conference Map</title>
    <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4/dist/maplibre-gl.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #f5f5f5;
            color: #333;
        }

        .page-header {
            max-width: 900px;
            margin: 40px auto 0;
            padding: 0 20px;
        }
        .page-header h1 {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 16px;
        }

        .map-card {
            max-width: 900px;
            margin: 0 auto 40px;
            padding: 0 20px;
        }
        .map-card-inner {
            background: #fff;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.1);
        }

        #map { width: 100%; height: 500px; }

        .map-legend {
            padding: 12px 20px;
            border-top: 1px solid #eee;
            display: flex;
            gap: 20px;
            font-size: 13px;
            color: #555;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        #legend-marker {
            position: relative;
            width: 19px;
            height: 29px;
            flex-shrink: 0;
        }
        #legend-marker .maplibregl-marker {
            position: absolute;
            top: 0;
            left: 0;
        }
        .legend-line {
            width: 24px;
            height: 2px;
            background: repeating-linear-gradient(
                to right,
                #e67e22 0px, #e67e22 6px,
                transparent 6px, transparent 10px
            );
            flex-shrink: 0;
        }

        .marker-popup h3 { margin: 0 0 4px; font-size: 15px; }
        .marker-popup p { margin: 0; font-size: 13px; color: #555; }
        .marker-popup a { color: #2980b9; text-decoration: none; font-size: 12px; border: none; }
        .marker-popup a:hover { text-decoration: underline; }
    </style>
</head>
<body>

<div class="page-header">
    <h1>LFNW 2026 Conference Map</h1>
</div>

<div class="map-card">
    <div class="map-card-inner">
        <div id="map"></div>
        <div class="map-legend">
            <div class="legend-item">
                <div id="legend-marker"></div>
                <span>Conference Location</span>
            </div>
            <div class="legend-item">
                <div class="legend-line"></div>
                <span>Friday Stroll</span>
            </div>
        </div>
    </div>
</div>

<script src="https://unpkg.com/maplibre-gl@4/dist/maplibre-gl.js"></script>
<script>
document.getElementById("legend-marker").appendChild(
    new maplibregl.Marker({ color: "#e74c3c", scale: 0.7 }).getElement()
);

const map = new maplibregl.Map({
    container: "map",
    style: "osm-bright-style.json",
    center: [-122.495, 48.757],
    zoom: 13
});

map.addControl(new maplibregl.NavigationControl(), "top-right");

map.on("load", () => {
    map.addSource("friday-stroll", {
        type: "geojson",
        data: "Friday_Stroll.geojson"
    });

    const firstLabelLayer = map.getStyle().layers.find(l => l.type === "symbol")?.id;

    map.addLayer({
        id: "friday-stroll-line",
        type: "line",
        source: "friday-stroll",
        paint: {
            "line-color": "#e67e22",
            "line-width": 2,
            "line-dasharray": [2, 1.5]
        }
    }, firstLabelLayer);

    fetch("conference_locations.geojson")
        .then(r => r.json())
        .then(data => {
            const bounds = new maplibregl.LngLatBounds();

            data.features.forEach(feature => {
                const props = feature.properties;
                const coords = feature.geometry.coordinates;
                bounds.extend(coords);

                const popup = new maplibregl.Popup({ offset: 25 })
                    .setHTML(`
                        <div class="marker-popup">
                            <h3>${props.location_name}</h3>
                            ${props.info_box ? `<p>${props.info_box}</p>` : ""}
                            ${props.osm_link ? `<a href="${props.osm_link}" target="_blank">View on OpenStreetMap</a>` : ""}
                        </div>
                    `);

                new maplibregl.Marker({ color: "#e74c3c", scale: 0.7 })
                    .setLngLat(coords)
                    .setPopup(popup)
                    .addTo(map);
            });

            map.fitBounds(bounds, { padding: 60, maxZoom: 15 });
        });
});
</script>

</body>
</html>
