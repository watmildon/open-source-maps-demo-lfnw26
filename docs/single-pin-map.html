<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Single Pin Conference Map Demo</title>
    <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4/dist/maplibre-gl.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #f5f5f5;
            color: #333;
        }

        .page-header {
            max-width: 900px;
            margin: 40px auto 0;
            padding: 0 20px;
        }
        .page-header h1 {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 16px;
        }

        .map-card {
            max-width: 900px;
            margin: 0 auto 40px;
            padding: 0 20px;
        }
        .map-card-inner {
            background: #fff;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.1);
        }

        #map { width: 100%; height: 400px; }

        .venue-info {
            padding: 16px 20px;
            border-top: 1px solid #eee;
        }
        .venue-info h2 {
            font-size: 18px;
            margin-bottom: 4px;
        }
        .venue-info p {
            font-size: 14px;
            color: #666;
            margin: 0;
        }
        .venue-info a {
            color: #2980b9;
            text-decoration: none;
            font-size: 13px;
        }
        .venue-info a:hover { text-decoration: underline; }

        .marker-popup h3 { margin: 0 0 4px; font-size: 15px; }
        .marker-popup p { margin: 0; font-size: 13px; color: #555; }
        .marker-popup a { color: #2980b9; text-decoration: none; font-size: 12px; }
        .marker-popup a:hover { text-decoration: underline; }
    </style>
</head>
<body>

<div class="page-header">
    <h1>Single Pin Conference Map Demo</h1>
</div>

<div class="map-card">
    <div class="map-card-inner">
        <div id="map"></div>
        <div class="venue-info">
            <h2>Bellingham Technical College</h2>
            <p><a href="https://www.openstreetmap.org/node/356542688" target="_blank">3028 Lindbergh Avenue, Bellingham, WA 98225 USA</a></p>
            <a href="https://www.btc.edu/" target="_blank">https://www.btc.edu/</a>
        </div>
    </div>
</div>

<script src="https://unpkg.com/maplibre-gl@4/dist/maplibre-gl.js"></script>
<script>
const VENUE = {
    name: "Bellingham Technical College",
    address: "3028 Lindbergh Avenue, Bellingham, WA 98225",
    lngLat: [-122.5109695, 48.7654008]
};

const map = new maplibregl.Map({
    container: "map",
    style: "osm-bright-style.json",
    center: VENUE.lngLat,
    zoom: 15,
    scrollZoom: true
});

map.addControl(new maplibregl.NavigationControl(), "top-right");

// Venue marker
const popup = new maplibregl.Popup({ offset: 25 })
    .setHTML(`
        <div class="marker-popup">
            <h3>${VENUE.name}</h3>
            <p>${VENUE.address}</p>
            <a href="https://www.openstreetmap.org/?mlat=${VENUE.lngLat[1]}&mlon=${VENUE.lngLat[0]}#map=17/${VENUE.lngLat[1]}/${VENUE.lngLat[0]}" target="_blank">View on OpenStreetMap</a>
        </div>
    `);

new maplibregl.Marker({ color: "#e74c3c" })
    .setLngLat(VENUE.lngLat)
    .setPopup(popup)
    .addTo(map);
</script>

</body>
</html>
